<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Profiling Dashboard - Performance Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      padding: 20px;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 20px;
      height: 100%;
    }

    .header {
      grid-column: 1 / -1;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header-info {
      font-size: 12px;
      color: #aaa;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .session {
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid #58a6ff;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    .session-name {
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 8px;
    }

    .stage {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 11px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stage:last-child {
      border-bottom: none;
    }

    .stage-name {
      color: #aaa;
    }

    .stage-time {
      font-weight: 600;
      font-family: 'Monaco', monospace;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .stage-time.fast {
      background: rgba(60, 185, 80, 0.2);
      color: #3fb950;
    }

    .stage-time.medium {
      background: rgba(216, 128, 33, 0.2);
      color: #d88021;
    }

    .stage-time.slow {
      background: rgba(244, 81, 73, 0.2);
      color: #f85149;
    }

    .metric-card {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .metric-item {
      text-align: center;
    }

    .metric-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #58a6ff;
    }

    .metric-value.warn {
      color: #d88021;
    }

    .metric-value.error {
      color: #f85149;
    }

    .console-log {
      background: rgba(0, 0, 0, 0.5);
      padding: 12px;
      border-radius: 6px;
      font-size: 10px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', monospace;
    }

    .log-line {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .log-line:last-child {
      border-bottom: none;
    }

    .log-error { color: #f85149; }
    .log-warn { color: #d88021; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #58a6ff, #3fb950);
      transition: width 0.3s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <h1>⚡ Performance Profiling Dashboard</h1>
      <div class="header-info">
        Monitore em tempo real o processo de criação de clientes
        | Abra o console do navegador (F12) enquanto cria clientes
      </div>
    </div>

    <!-- Left: Sessions -->
    <div class="panel">
      <div class="panel-title">📊 Sessões</div>
      <div id="sessionsList"></div>
    </div>

    <!-- Right: Metrics -->
    <div class="panel">
      <div class="panel-title">📈 Métricas</div>
      <div id="metricsList"></div>
      <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="panel-title">🖥️ Console Log</div>
        <div class="console-log" id="consoleLogs"></div>
      </div>
    </div>
  </div>

  <script>
    // Monitorar DetailedProfiler do iframe da app
    const sessions = [];
    const logs = [];

    // Interceptar console
    const origLog = console.log;
    const origWarn = console.warn;
    const origError = console.error;

    console.log = function(...args) {
      origLog.apply(console, args);
      addLog('info', args.join(' '));
    };

    console.warn = function(...args) {
      origWarn.apply(console, args);
      addLog('warn', args.join(' '));
    };

    console.error = function(...args) {
      origError.apply(console, args);
      addLog('error', args.join(' '));
    };

    function addLog(type, message) {
      logs.unshift({ type, message, time: new Date().toLocaleTimeString() });
      if (logs.length > 50) logs.pop();
      render();
    }

    function render() {
      // Render sessions
      const sessionsList = document.getElementById('sessionsList');
      if (window.DetailedProfiler) {
        const allSessions = window.DetailedProfiler.getAllSessions();
        sessionsList.innerHTML = allSessions.map(session => {
          const totalDuration = session.markers[session.markers.length - 1]?.totalDuration || 0;
          const color = totalDuration > 1000 ? 'slow' : totalDuration > 500 ? 'medium' : 'fast';

          return `
            <div class="session">
              <div class="session-name">${session.name}</div>
              ${session.markers.slice(1).map(marker => `
                <div class="stage">
                  <span class="stage-name">${marker.name}</span>
                  <span class="stage-time ${marker.duration > 500 ? 'slow' : marker.duration > 200 ? 'medium' : 'fast'}">
                    ${Math.round(marker.duration)}ms
                  </span>
                </div>
              `).join('')}
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${Math.min(100, (totalDuration / 1000) * 100)}%"></div>
              </div>
            </div>
          `;
        }).join('');
      } else {
        sessionsList.innerHTML = '<div style="color: #aaa; font-size: 12px;">Aguardando dados...</div>';
      }

      // Render metrics
      const metricsList = document.getElementById('metricsList');
      if (window.DetailedProfiler) {
        const allSessions = window.DetailedProfiler.getAllSessions();
        const totalSessions = allSessions.length;
        const avgDuration = allSessions.length > 0
          ? Math.round(allSessions.reduce((sum, s) => sum + (s.markers[s.markers.length - 1]?.totalDuration || 0), 0) / allSessions.length)
          : 0;
        const slowestSession = allSessions.reduce((max, s) => {
          const d = s.markers[s.markers.length - 1]?.totalDuration || 0;
          return d > (max.duration || 0) ? { name: s.name, duration: d } : max;
        }, {});

        metricsList.innerHTML = `
          <div class="metric-card">
            <div class="metric-item">
              <div class="metric-label">Total Sessões</div>
              <div class="metric-value">${totalSessions}</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Duração Média</div>
              <div class="metric-value ${avgDuration > 500 ? 'warn' : ''}">${avgDuration}ms</div>
            </div>
          </div>
          <div class="metric-card">
            <div class="metric-item">
              <div class="metric-label">Mais Lento</div>
              <div class="metric-value" style="font-size: 14px;">${slowestSession.name || '-'}</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Tempo</div>
              <div class="metric-value ${slowestSession.duration > 1000 ? 'error' : 'warn'}">${slowestSession.duration || 0}ms</div>
            </div>
          </div>
        `;
      }

      // Render console logs
      const consoleLogs = document.getElementById('consoleLogs');
      consoleLogs.innerHTML = logs.map(log => {
        const typeClass = `log-${log.type}`;
        return `<div class="log-line ${typeClass}">[${log.time}] ${log.message.slice(0, 80)}</div>`;
      }).join('');
      consoleLogs.scrollTop = 0;
    }

    // Render inicial
    render();

    // Auto-refresh a cada 500ms
    setInterval(render, 500);
  </script>
</body>
</html>
